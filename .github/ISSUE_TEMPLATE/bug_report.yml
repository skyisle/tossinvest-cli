name: Bug Report
description: 버그를 제보합니다
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 설명
      description: 어떤 문제가 발생했나요?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 문제를 재현할 수 있는 단계를 알려주세요.
      placeholder: |
        1. `tossctl ...` 실행
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 어떻게 동작해야 하나요?
    validations:
      required: false
  - type: textarea
    id: doctor_report
    attributes:
      label: tossctl doctor --report 출력
      description: |
        `tossctl doctor --report` 실행 결과를 그대로 붙여넣어 주세요. 버전, OS, Chrome, 세션 상태, 엔드포인트별 응답(200/401/403), 파일 권한, 남은 임시 파일까지 한 번에 확인할 수 있어 이슈 진단이 크게 빨라집니다. 홈 디렉토리 경로는 자동으로 `~`로 redact되어 사용자명이 노출되지 않습니다.
      render: json
      placeholder: |
        {
          "version": { "version": "0.4.x", ... },
          "diagnostics": { "probes": [...], "file_modes": [...] }
        }
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tossctl version (doctor --report를 실행할 수 없는 경우)
      description: "`tossctl version` 출력. 위 doctor --report를 첨부했다면 생략 가능."
      placeholder: "tossctl 0.4.x commit: ... date: ... os/arch: ..."
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: 설치 방법
      options:
        - "curl | sh (설치 스크립트)"
        - Homebrew
        - GitHub Releases (수동 다운로드)
        - From source (make build)
    validations:
      required: true
